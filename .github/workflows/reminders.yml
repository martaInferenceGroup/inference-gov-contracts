name: Scheduled Reminders

on:
  schedule:
    # Token renewal reminder — every 80 days (1st of Jan, Mar, May, Jul, Sep, Nov)
    - cron: '0 9 1 1,3,5,7,9,11 *'
    # UK clocks go back (last Sunday of October) — remind week before
    - cron: '0 9 20 10 *'
    # UK clocks go forward (last Sunday of March) — remind week before
    - cron: '0 9 20 3 *'

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Send reminder
        env:
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_REFRESH_TOKEN: ${{ secrets.MS_REFRESH_TOKEN }}
        run: |
          python -c "
          import os, requests
          from datetime import datetime

          # Get access token
          resp = requests.post(
              f'https://login.microsoftonline.com/{os.environ[\"MS_TENANT_ID\"]}/oauth2/v2.0/token',
              data={
                  'client_id': os.environ['MS_CLIENT_ID'],
                  'grant_type': 'refresh_token',
                  'refresh_token': os.environ['MS_REFRESH_TOKEN'],
                  'scope': 'https://graph.microsoft.com/Mail.Send offline_access',
              },
          )
          token = resp.json()['access_token']

          month = datetime.now().month
          if month in (1, 3, 5, 7, 9, 11):
              subject = 'Reminder: Renew Microsoft Token for Gov Contracts Email'
              body = '''<div style=\"font-family:Arial,sans-serif; max-width:600px; margin:0 auto; padding:20px;\">
                  <h2 style=\"color:#30475E;\">Token Renewal Needed</h2>
                  <p>The Microsoft refresh token for the weekly Gov Contracts email should be renewed every ~80 days to prevent expiry.</p>
                  <h3>What to do (2 minutes):</h3>
                  <ol>
                      <li>Open a terminal on your machine</li>
                      <li>Navigate to the Automated_gov_contracts folder</li>
                      <li>Run: <code>python scripts/get_ms_token.py</code></li>
                      <li>Sign in when prompted</li>
                      <li>Copy the new refresh token</li>
                      <li>Go to <a href=\"https://github.com/martaInferenceGroup/inference-gov-contracts/settings/secrets/actions\">GitHub Secrets</a></li>
                      <li>Update <strong>MS_REFRESH_TOKEN</strong> with the new value</li>
                  </ol>
                  <p style=\"color:#6b7785; font-size:12px;\">If you don\\'t do this, the Friday email will eventually stop working.</p>
              </div>'''
          elif month == 10:
              subject = 'Reminder: UK Clocks Going Back — Adjust Gov Contracts Email'
              body = '''<div style=\"font-family:Arial,sans-serif; max-width:600px; margin:0 auto; padding:20px;\">
                  <h2 style=\"color:#30475E;\">Clock Change — BST to GMT</h2>
                  <p>UK clocks go back this month. The weekly Gov Contracts email will arrive at <strong>7:30 AM</strong> instead of 8:30 AM.</p>
                  <h3>To keep 8:30 AM delivery:</h3>
                  <p>Edit <code>.github/workflows/weekly-contracts.yml</code> and change:</p>
                  <p><code>cron: \\'30 7 * * 5\\'</code> &rarr; <code>cron: \\'30 8 * * 5\\'</code></p>
                  <p style=\"color:#6b7785; font-size:12px;\">Or ignore — the email still sends, just one hour earlier.</p>
              </div>'''
          elif month == 3:
              subject = 'Reminder: UK Clocks Going Forward — Adjust Gov Contracts Email'
              body = '''<div style=\"font-family:Arial,sans-serif; max-width:600px; margin:0 auto; padding:20px;\">
                  <h2 style=\"color:#30475E;\">Clock Change — GMT to BST</h2>
                  <p>UK clocks go forward this month. If you adjusted the cron in October, change it back now:</p>
                  <p><code>cron: \\'30 8 * * 5\\'</code> &rarr; <code>cron: \\'30 7 * * 5\\'</code></p>
                  <p>This keeps the email arriving at <strong>8:30 AM BST</strong>.</p>
                  <p style=\"color:#6b7785; font-size:12px;\">If you never changed it in October, ignore this.</p>
              </div>'''
          else:
              exit(0)

          # Send only to Marta
          payload = {
              'message': {
                  'subject': subject,
                  'body': {'contentType': 'HTML', 'content': body},
                  'toRecipients': [{'emailAddress': {'address': 'marta@inferencegroup.com'}}],
              },
              'saveToSentItems': 'true',
          }

          r = requests.post(
              'https://graph.microsoft.com/v1.0/me/sendMail',
              json=payload,
              headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'},
          )
          print(f'Reminder sent: {r.status_code}')
          "
